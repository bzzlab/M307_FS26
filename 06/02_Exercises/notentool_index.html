<!--
***************************
Aufgabe 1 – Formular strukturieren
***************************

Strukturieren Sie das Formular mit <fieldset>.

Gruppieren Sie die Eingaben in zwei Bereiche:

1. Schüler
   - Name

2. Prüfung
   - Fach
   - Prüfung
   - Note
   - Datum

Verwenden Sie zusätzlich das Element <legend>.
-->

<form id="notenForm">

  <label for="name">Name</label>
  <input type="text" id="name" name="name" required>

  <br><br>

  <label for="fach">Fach</label>
  <select id="fach" name="fach" required>

    <option value="">Bitte wählen</option>
    <option>Informatik</option>
    <option>Mathematik</option>
    <option>Englisch</option>

  </select>

  <br><br>

  <label for="pruefung">Prüfung</label>
  <input type="text" id="pruefung" name="pruefung" required>

  <br><br>

  <label for="note">Note</label>
  <input
      type="number"
      id="note"
      name="note"
      min="1"
      max="6"
      step="0.5"
      required>

  <br><br>

  <label for="datum">Datum</label>
  <input
      type="date"
      id="datum"
      name="datum"
      required>

  <br><br>

  <button type="submit">Speichern</button>

</form>
