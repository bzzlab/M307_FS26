<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<title>Noten Tool</title>
</head>

<body>

<h1>Noten-Tool</h1>

<form id="notenForm" onsubmit="submitForm(event)">

  <fieldset>
    <legend>Schüler</legend>

    <label for="name">Name</label><br>
    <input
      type="text"
      id="name"
      name="name"
      required>

  </fieldset>

  <br>

  <fieldset>
    <legend>Prüfung</legend>

    <label for="fach">Fach</label><br>
    <select id="fach" name="fach" required>

      <option value="">Bitte wählen</option>
      <option>Informatik</option>
      <option>Mathematik</option>
      <option>Englisch</option>

    </select>

    <br><br>

    <label for="pruefung">Prüfung</label><br>
    <input
      type="text"
      id="pruefung"
      name="pruefung"
      required>

    <br><br>

    <label for="note">Note</label><br>
    <input
      type="number"
      id="note"
      name="note"
      min="1"
      max="6"
      step="0.5"
      required>

    <br><br>

    <label for="datum">Datum</label><br>
    <input
      type="date"
      id="datum"
      name="datum"
      required>

  </fieldset>

  <br>

  <button type="submit">Speichern</button>

</form>

<script>

function submitForm(event){

  // verhindert das automatische Neuladen
  event.preventDefault();

  // Formulardaten auslesen
  const name =
    document.getElementById("name").value;

  const fach =
    document.getElementById("fach").value;

  const pruefung =
    document.getElementById("pruefung").value;

  const note =
    document.getElementById("note").value;

  const datum =
    document.getElementById("datum").value;


  // Daten in Objekt speichern
  const noteObj = {

    name: name,
    fach: fach,
    pruefung: pruefung,
    note: note,
    datum: datum

  };


  // Ausgabe in Konsole
  console.log(noteObj);


  // Vorbereitung für API
  /*
  fetch("/api/noten", {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify(noteObj)

  });
  */

}

</script>

</body>
</html>
